  size: 54
  decorations:
    border:
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "
      lore: []
      slots: [0,1,2,3,4,5,6,7,8,45,46,47,48,50,51,52,53]
    info:
      material: "HOPPER"
      name: "&e&lꜱᴇʟʟ ɢᴜɪ"
      lore:
        - ""
        - "&6&l｜&fPlace &ayour items&f in the"
        - "&6&l｜&fempty slots and &cclose"
