# Price formatting settings
#   Examples:
#     "#,##0.00"   → 1,000.00  (US style)
#     "#.##0,00"   → 1.000,00  (EU style)
#     "#,##0"      → 1,000     (no decimals)
#     "0.##"       → 1000.5    (minimal decimals)
# locale: Language tag for number formatting
#   Examples: "en-US", "it-IT", "de-DE", "fr-FR", "pt-BR"
settings:
  # Enable anonymous statistics via bStats
  metrics: true
  price-format: "#,##0.00"
  price-locale: "en-US"

# Sound settings
# Set sound to "" or "NONE" to disable
sounds:
  sell-success:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.2
  sell-fail:
    sound: "ENTITY_VILLAGER_NO"
    volume: 0.7
    pitch: 0.8

# Automatically sell sellable items from the player's inventory at a fixed interval.
# Items with custom names, enchantments or NBT are ignored for safety.
auto-sell:
  enabled: true
  interval-seconds: 10 # Interval in seconds between auto-sell checks
  default-enabled: false
  ignore-hand: true
  notify: true

# Automatically sell items when the player picks them up from the ground.
# Items with custom names, enchantments or NBT are ignored for safety.
auto-pickup:
  enabled: true
  notify: true

worth-lore:
  enabled: true
  format: "&7Worth: &a{price}$"

sell-multipliers:
  enabled: true
  multipliers:
    "3.0": "ultrasell.multiplier.legendary"
    "2.5": "ultrasell.multiplier.mythic"
    "2.0": "ultrasell.multiplier.mvp"
    "1.5": "ultrasell.multiplier.vip"

